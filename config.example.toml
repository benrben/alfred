# Alfred configuration.
# Copy this to ~/.config/voicebridge/config.toml and edit. Anything you omit
# falls back to the built-in defaults. CLI flags override these per-run.

[stt]
# Any mlx-community Whisper repo (auto-downloaded & cached on first use).
#   whisper-large-v3-turbo : fast, excellent Hebrew TRANSCRIPTION (default)
#   whisper-large-v3       : best for Whisper-native TRANSLATE (see translate_via)
model = "mlx-community/whisper-large-v3-turbo"
# "auto" detects the language. Force it for best accuracy, e.g. "he", "en".
language = "auto"
# Bias the recognizer toward names/jargon it tends to mishear, e.g.
# "Anthropic, Hadera, Ben Reich". Leave empty to disable.
initial_prompt = ""

[processing]
# Each stage is independent. All off = raw transcription, no LLM call at all.
# Default below = the Prompt Optimizer (rewrite on, mode "prompt"); set
# rewrite = false (or pick a no-AI capture in a front-end) for a pure transcript.
translate = false      # produce English output
rewrite   = true       # remove fillers/false starts, fix grammar, shape to mode
optimize  = false      # tighten & clarify
# Rewrite target. Setting --mode on the CLI also turns rewrite on.
#   prompt   -> Prompt Optimizer (rewrites input into an optimized AI prompt)
#   email | message | commit | notes -> shape to that format
#   raw      -> cleanup only (fix fillers/grammar, keep structure)
mode = "prompt"
# How translation happens when translate = true:
#   "llm"     -> Claude/Codex translates (better for Hebrew, keeps tone, 1 pass)
#   "whisper" -> Whisper's translate task (fully on-device; English only;
#                prefer model = whisper-large-v3 for this)
translate_via = "llm"
# true  = one LLM call applying all enabled stages (fast, recommended)
# false = a separate LLM call per stage (slower; easier to debug)
combine_stages = true

[llm]
# local = strict on-device MLX model: $0, offline, nothing leaves the Mac — the
#   default. auto = use claude if installed, else codex; or force "claude" /
#   "codex" (these shell out to your signed-in CLI, keyless, as a quality boost).
# Note: backend = "local" never silently falls back to a network CLI.
backend = "local"
# On-device model for the "local" backend (any mlx-community instruct repo).
# First use downloads it (~2GB for the 3B-4bit). Qwen3-4B/8B once you've confirmed
# the repo is available is a quality upgrade.
local_model = "mlx-community/Qwen2.5-3B-Instruct-4bit"
local_max_tokens = 1024   # cap on generated tokens per transform
local_idle_secs = 600     # free the in-memory model after this many idle seconds
# Aliases track the latest model and are safer than dated names.
claude_model = "sonnet"
codex_model = ""          # empty = codex default
# Reasoning ("thinking") effort — kept low for fast text transforms (cleaning up
# dictation doesn't need deep reasoning). "" = leave the CLI default.
claude_effort = "low"             # low | medium | high | xhigh | max
codex_reasoning_effort = "low"    # low | medium | high  ("minimal" errors while
                                  # codex's web_search/image_gen tools are on)
# Models offered in the front-end's dropdowns (claude defaults: opus/sonnet/haiku).
# Add extras here to extend those lists; the active model stays claude_model/codex_model.
# claude_models = ["opus", "sonnet", "haiku"]
# codex_models = []
# Extra args appended to each invocation, if you need them.
claude_extra_args = []
codex_extra_args = []
timeout = 0               # seconds per LLM call (0 = no limit; good for big prompts)
# Speed knobs ---------------------------------------------------------------
# fast: run the LLM in an isolated, minimal mode for the text transform — skip
#   your MCP servers, plugins, hooks, CLAUDE.md and settings (pure startup
#   overhead here, and a correctness risk). Big win with many MCP servers.
fast = true
# warm: in the daemon (serve), keep ONE claude process alive and stream each
#   transform to it, so the ~3s CLI startup is paid once, not per capture
#   (warm turns ~1.5-2s vs ~5s cold). Keyless — still the CLI login. Each
#   transform is self-contained, so turns stay independent.
warm = true
warm_max_turns = 25       # recycle the warm process after N turns (bounds context)
warm_idle_secs = 600      # recycle the warm process after this many idle seconds

[output]
mode = "copy"                       # "copy" or "paste" (paste also copies)
size_threshold = 0                  # chars above this are saved to a file (0 = never; always copy)
save_dir = "~/Documents/VoiceBridge"
save_format = "md"                  # "md" or "txt"
keep_audio = false                  # keep the recording after transcription

[history]
enabled = true
dir = "~/.voicebridge/history"
max_items = 50

# ---------------------------------------------------------------------------
# Intent prompts (optional). Customize how `rewrite` shapes text per mode, and
# add your own modes. Anything here OVERRIDES the built-ins; new keys ADD new
# modes that show up in the front-end's format picker (Cmd+Option+I, or the
# menu's "Dictate as…"). Run `voicebridge.py modes` to see the current list;
# the front-end's "Reload intent modes" picks up edits without a full reload.
#
# Built-in modes: prompt (Prompt Optimizer), email, message, commit, notes, raw.
# Each entry takes a required `prompt` and optional `label` / `description`
# (shown in the picker). Shorthand `name = "prompt text"` also works.
#
# `replace = true` makes `prompt` the ENTIRE rewrite instruction instead of being
# appended to the built-in cleanup ("remove fillers, fix grammar, keep tone").
# Use it for standalone instructions like the Prompt Optimizer; the built-in
# "prompt" mode already does this.

# Override a built-in mode's prompt:
# [intent.email]
# prompt = "Rewrite as a concise, friendly email in my voice. No subject line."

# Add your own mode (shows up as "Standup — Daily standup"):
# [intent.standup]
# prompt = "Turn this into standup notes: 3 bullets — done, doing, blockers."
# label = "Standup"
# description = "Daily standup"

# A standalone instruction that replaces the cleanup rewrite entirely:
# [intent.translate-formal]
# prompt = "Translate to formal English. Output only the translation."
# label = "Formal EN"
# replace = true
